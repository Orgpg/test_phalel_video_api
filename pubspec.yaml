name: test_phalel_video_api
description: "A production-ready Flutter application for testing a Private Video API."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^5.1.0
  dio: ^5.4.1
  cached_network_image: ^3.3.1
  video_player: ^2.8.2
  chewie: ^1.7.5
  go_router: ^13.2.0
  provider: ^6.1.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - .env
