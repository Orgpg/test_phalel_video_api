name: test_phalel_video_api
description: "A production-ready Flutter application for testing a Private Video API."
publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.1
  dio: ^5.4.1
  cached_network_image: ^3.3.1
  video_player: ^2.8.2
  video_player_win: ^2.2.1
  chewie: ^1.7.5
  go_router: ^17.3.0
  provider: ^6.1.1
  intl: ^0.19.0
  file_picker: ^8.1.2
  mime: ^1.0.5
  package_info_plus: ^8.0.0
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
